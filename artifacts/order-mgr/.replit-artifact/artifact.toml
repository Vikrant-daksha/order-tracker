kind = "mobile"
previewPath = "/"
title = "OrderFlow"
version = "1.0.0"
id = "artifacts/order-mgr"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25499

[services.development]
run = "pnpm --filter @workspace/order-mgr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/order-mgr", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/order-mgr", "run", "serve" ]

[services.env]
PORT = "25499"
BASE_PATH = "/"
