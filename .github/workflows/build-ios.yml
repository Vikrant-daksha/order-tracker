name: Build iOS Simulator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: EAS iOS Build
    runs-on: ubuntu-latest   # EAS cloud handles the macOS side — you don't need a Mac runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Register / link EAS project
        working-directory: artifacts/order-mgr
        run: eas init --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit iOS build to EAS
        working-directory: artifacts/order-mgr
        # preview profile builds a .app Simulator bundle (free, no Apple Developer account needed)
        # Change to --profile production for a real IPA (requires Apple Developer account)
        run: eas build --platform ios --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Done
        run: echo "Build submitted. Track + download .app at https://expo.dev/accounts/vikrant_05/projects/order-mgr/builds"
